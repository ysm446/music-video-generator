# MV Generator 設定ファイル

comfyui:
  url: "http://localhost:8188"
  image_workflow: "workflows/image/zimage_turbo.json"
  video_workflow: "workflows/video/wan22_i2v.json"
  poll_interval: 2.0       # ジョブ完了ポーリング間隔（秒）
  timeout: 300             # タイムアウト（秒）

llm:
  url: "http://localhost:11434/v1"
  model: "qwen3-vl"
  api_key: "dummy"         # ローカルサーバーのためダミー
  temperature: 0.7
  max_tokens: 4096

project:
  base_dir: "projects"     # プロジェクト保存先ディレクトリ

defaults:
  scene_duration: 5        # シーン長さ（秒）
  resolution:
    width: 1280
    height: 720
  fps: 16
